<style>
  :root {
    --primary: #a74d4a;
    --secondary: #818b7e;
    --bg: #eae6e1;
    --white: #f5f5f5;
    --black: #121212;
    --cream: #f5f0eb;
    --dark-text: #2a2220;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Lato', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--cream);
    color: var(--dark-text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .links-header {
    width: 100%;
    background: var(--primary);
    text-align: center;
    padding: 4rem 2rem 3rem;
  }

  .links-monogram {
    font-family: var(--serif);
    font-size: 3.5rem;
    font-weight: 700;
    color: rgba(245,245,245,0.15);
    letter-spacing: -0.05em;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .links-name {
    font-family: var(--serif);
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .links-tagline {
    font-family: var(--sans);
    font-size: 0.82rem;
    font-weight: 400;
    color: rgba(245,245,245,0.8);
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
  }

  .links-body {
    width: 100%;
    max-width: 500px;
    padding: 3rem 2rem 5rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .links-section-label {
    font-family: var(--sans);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--secondary);
    margin: 1.5rem 0 0.5rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid rgba(129,139,126,0.25);
  }

  .link-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    background: var(--white);
    text-decoration: none;
    color: var(--dark-text);
    font-family: var(--sans);
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    border: 1px solid rgba(167,77,74,0.1);
    transition: all 0.2s;
  }

  .link-item:hover {
    background: var(--primary);
    color: var(--white);
    border-color: var(--primary);
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 1rem;
    font-family: var(--sans);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--secondary);
    text-decoration: none;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--primary); }
</style>
